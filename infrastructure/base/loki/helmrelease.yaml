apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: loki
      version: "6.53.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    # Single-binary mode — suitable for dev/staging.
    # Switch to distributed mode for high-volume prod workloads.
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      storage:
        type: filesystem
    singleBinary:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    # Promtail ships logs from all pods to Loki
    promtail:
      enabled: true
