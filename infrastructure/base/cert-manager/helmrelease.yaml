apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: cert-manager
      version: "1.14.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    installCRDs: true
    serviceAccount:
      create: true
      name: cert-manager
      annotations:
        eks.amazonaws.com/role-arn: ${CERT_MANAGER_ROLE_ARN}
    securityContext:
      fsGroup: 1001
