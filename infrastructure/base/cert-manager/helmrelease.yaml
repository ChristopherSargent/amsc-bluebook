apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: cert-manager
      version: "1.19.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    crds:
      enabled: true
    serviceAccount:
      create: true
      name: cert-manager
      annotations:
        eks.amazonaws.com/role-arn: ${CERT_MANAGER_ROLE_ARN}
    securityContext:
      fsGroup: 1001
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
