apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kong
  namespace: kong
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      # Kong Ingress Controller (KIC) — the Kubernetes-native deployment model.
      # Manages Kong Gateway via KongRoute, KongService, and Ingress CRDs.
      # Kong Gateway (OSS) is fully open source under Apache 2.0.
      chart: ingress
      version: "0.22.*"
      sourceRef:
        kind: HelmRepository
        name: kong
        namespace: flux-system
  values:
    # CRDs must be installed by the chart — no separate mechanism exists here.
    ingressController:
      enabled: true
      installCRDs: true

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi

    # Custom Kong image with the kong-openid-connect community plugin pre-installed.
    # Build docker/kong/Dockerfile, push to ECR, and set KONG_IMAGE_REPOSITORY +
    # KONG_IMAGE_TAG in cluster-vars. See docker/kong/Dockerfile for build details.
    image:
      repository: "${KONG_IMAGE_REPOSITORY}"
      tag: "${KONG_IMAGE_TAG}"

    gateway:
      # Register the community OIDC plugin alongside the built-in plugin set.
      env:
        plugins: bundled,kong-openid-connect
      # Kong proxy sits behind an AWS Network Load Balancer.
      # Kong handles L7 routing, rate limiting, auth plugins, and request transforms.
      replicaCount: 2

      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          memory: 512Mi

      # Kong admin API — kept ClusterIP (not exposed externally).
      admin:
        enabled: true
        service:
          type: ClusterIP

      # Proxy service — AWS LBC provisions an NLB in front of this service.
      proxy:
        enabled: true
        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
            service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
