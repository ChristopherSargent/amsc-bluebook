apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kong
  namespace: kong
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      # Kong Ingress Controller (KIC) — the Kubernetes-native deployment model.
      # Manages Kong Gateway via KongRoute, KongService, and Ingress CRDs.
      # Kong Gateway (OSS) is fully open source under Apache 2.0.
      chart: ingress
      version: "0.12.*"
      sourceRef:
        kind: HelmRepository
        name: kong
        namespace: flux-system
  values:
    gateway:
      # Kong proxy sits behind the AWS Load Balancer Controller ALB.
      # ALB terminates TLS and forwards to Kong; Kong handles L7 routing,
      # rate limiting, authentication, and plugin execution.
      replicaCount: 2

      resources:
        requests:
          cpu: 200m
          memory: 256Mi

      # Kong admin API — kept ClusterIP (not exposed externally).
      admin:
        enabled: true
        type: ClusterIP

      # Proxy service — AWS LBC creates an ALB in front of this NLB.
      proxy:
        type: LoadBalancer
        annotations:
          # Provision a Network Load Balancer for Kong's proxy port.
          # Kong then handles all L7 routing inward from there.
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

    # Kong Ingress Controller settings
    controller:
      ingressController:
        enabled: true
        installCRDs: false  # Flux applies CRDs via the HelmRelease

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
