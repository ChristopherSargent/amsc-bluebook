apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  timeout: 15m
  install:
    createNamespace: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.9.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      # Comes from cluster-secrets Secret via Flux substituteFrom — not the ConfigMap.
      adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
      ingress:
        enabled: false  # enable and configure per-environment overlay
      sidecar:
        datasources:
          enabled: true
        dashboards:
          enabled: true
    prometheus:
      prometheusSpec:
        retention: 15d
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
    alertmanager:
      enabled: true
