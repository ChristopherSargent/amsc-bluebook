apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../sources
  - ../base/cilium
  - ../base/aws-load-balancer-controller
  - ../base/kong
  - ../base/karpenter
  - ../base/metrics-server
  - ../base/cert-manager
  - ../base/external-dns
  - ../base/kube-prometheus-stack
  - ../base/loki
  - ../base/velero

# Prod-specific overrides applied on top of the base HelmReleases.
patches:
  - path: patches/loki-s3.yaml
    target:
      kind: HelmRelease
      name: loki
