apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Flux substitutes ${VAR} references in all resources using values from this ConfigMap.
  # The ConfigMap is written by Terraform after IAM roles are created — no manual ARN copying.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
