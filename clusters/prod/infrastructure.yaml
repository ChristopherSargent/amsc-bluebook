apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Flux substitutes ${VAR} references in all resources using values from these sources.
  # cluster-vars (ConfigMap) holds non-sensitive ARNs written by Terraform.
  # cluster-secrets (Secret) holds sensitive values (passwords) — never in a ConfigMap.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: cluster-secrets
