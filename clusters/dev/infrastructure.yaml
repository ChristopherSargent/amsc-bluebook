apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # cluster-vars (ConfigMap) holds non-sensitive ARNs written by Terraform.
  # cluster-secrets (Secret) holds sensitive values — marked optional so Flux
  # retries gracefully if Terraform hasn't finished writing it yet on first run.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: cluster-secrets
        optional: true
