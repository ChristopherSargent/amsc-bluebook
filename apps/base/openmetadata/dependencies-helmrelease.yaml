apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openmetadata-dependencies
  namespace: openmetadata
spec:
  interval: 10m
  timeout: 15m
  install:
    createNamespace: true
  chart:
    spec:
      chart: openmetadata-dependencies
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: open-metadata
        namespace: flux-system
  values:
    # Airflow disabled — not needed unless ingestion pipelines are used.
    airflow:
      enabled: false

    elasticsearch:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 2Gi
      # Elasticsearch on spot is risky for a stateful workload.
      # Pin to on-demand nodes in prod via a nodeSelector or tolerations overlay.
      esJavaOpts: "-Xmx1g -Xms1g"

    mysql:
      enabled: true
      primary:
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
