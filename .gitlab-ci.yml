stages:
  - validate
  - plan
  - apply
  - build
  - deploy

variables:
  AWS_REGION: us-east-1
  TF_ROOT: terraform/environments
  # Set these in GitLab CI/CD > Variables (masked, not protected):
  #   DEV_TF_ROLE_ARN, STAGING_TF_ROLE_ARN, PROD_TF_ROLE_ARN
  #   DEV_ECR_REGISTRY, STAGING_ECR_REGISTRY, PROD_ECR_REGISTRY
  #   CONFIG_REPO_PATH  (e.g. my-org/k8s-config)
  #   CONFIG_REPO_TOKEN (GitLab access token with write_repository scope)
  #   TF_VAR_gitlab_flux_token (GitLab deploy token, read_repository scope)
  #   TF_VAR_grafana_admin_password (initial Grafana admin password)

# ── OIDC auth helper ──────────────────────────────────────────────────────────
# Exchanges the GitLab OIDC token for temporary AWS credentials via STS.
.aws-auth:
  id_tokens:
    AWS_OIDC_TOKEN:
      aud: $CI_SERVER_URL  # must match the GitLab instance URL used in aws_iam_openid_connect_provider client_id_list
  before_script:
    - |
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" \
        $(aws sts assume-role-with-web-identity \
          --role-arn "$AWS_ROLE_ARN" \
          --role-session-name "gitlab-${CI_JOB_ID}" \
          --web-identity-token "$AWS_OIDC_TOKEN" \
          --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
          --output text))

# ── Terraform base ────────────────────────────────────────────────────────────
.terraform:
  image: hashicorp/terraform:1.7
  extends: .aws-auth
  cache:
    key: terraform-${CI_ENVIRONMENT_NAME}
    paths:
      - ${TF_ROOT}/${ENV}/.terraform

# ── Validate (all envs in parallel) ──────────────────────────────────────────
tf:validate:
  extends: .terraform
  stage: validate
  script:
    - cd ${TF_ROOT}/${ENV}
    - terraform init -backend=false
    - terraform validate
  parallel:
    matrix:
      - ENV: dev
        AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
      - ENV: staging
        AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
      - ENV: prod
        AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Dev plan + apply (auto on main) ──────────────────────────────────────────
tf:plan:dev:
  extends: .terraform
  stage: plan
  variables:
    ENV: dev
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/dev
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/dev/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

tf:apply:dev:
  extends: .terraform
  stage: apply
  variables:
    ENV: dev
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/dev
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Staging plan + apply (manual gate) ───────────────────────────────────────
tf:plan:staging:
  extends: .terraform
  stage: plan
  variables:
    ENV: staging
    AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/staging
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/staging/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

tf:apply:staging:
  extends: .terraform
  stage: apply
  variables:
    ENV: staging
    AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/staging
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# ── Prod plan + apply (tags only, manual gate) ────────────────────────────────
tf:plan:prod:
  extends: .terraform
  stage: plan
  variables:
    ENV: prod
    AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/prod
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/prod/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

tf:apply:prod:
  extends: .terraform
  stage: apply
  variables:
    ENV: prod
    AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/prod
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:prod
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# ── Build + push image to ECR ─────────────────────────────────────────────────
build:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  extends: .aws-auth
  variables:
    # Build uses dev role for pushing — ECR repos are per-account
    # For multi-account push, run separate jobs per account
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $DEV_ECR_REGISTRY
    - docker build -t $DEV_ECR_REGISTRY/myapp/backend:$CI_COMMIT_SHORT_SHA .
    - docker push $DEV_ECR_REGISTRY/myapp/backend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Deploy: bump image tag in config repo, Flux reconciles ───────────────────
.deploy:
  stage: deploy
  image: alpine/git
  script:
    - git clone https://oauth2:${CONFIG_REPO_TOKEN}@${CI_SERVER_HOST}/${CONFIG_REPO_PATH} config
    - cd config
    - sed -i "s|tag:.*|tag: ${CI_COMMIT_SHORT_SHA}|" clusters/${DEPLOY_ENV}/apps/myapp-values.yaml
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"
    - git diff --quiet || git commit -am "chore(${DEPLOY_ENV}): bump myapp to ${CI_COMMIT_SHORT_SHA}"
    - git push

deploy:dev:
  extends: .deploy
  variables:
    DEPLOY_ENV: dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:staging:
  extends: .deploy
  variables:
    DEPLOY_ENV: staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy:prod:
  extends: .deploy
  variables:
    DEPLOY_ENV: prod
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
