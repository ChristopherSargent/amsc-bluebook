stages:
  - validate
  - plan
  - apply
  - build
  - deploy

variables:
  AWS_REGION: us-east-1
  TF_ROOT: terraform/environments
  # Set these in GitLab CI/CD > Variables (masked, not protected):
  #   DEV_TF_ROLE_ARN, STAGING_TF_ROLE_ARN, PROD_TF_ROLE_ARN
  #   DEV_ECR_REGISTRY, STAGING_ECR_REGISTRY, PROD_ECR_REGISTRY
  #   CONFIG_REPO_PATH  (path to this repo, e.g. my-org/amsc-bluebook)
  #   CONFIG_REPO_TOKEN (GitLab access token with write_repository scope on this repo)
  #   TF_VAR_gitlab_flux_token (GitLab deploy token, read_repository scope)
  #   TF_VAR_grafana_admin_password (initial Grafana admin password)

# ── OIDC auth helper ──────────────────────────────────────────────────────────
# Exchanges the GitLab OIDC token for temporary AWS credentials via STS.
.aws-auth:
  id_tokens:
    AWS_OIDC_TOKEN:
      aud: $CI_SERVER_URL  # must match the GitLab instance URL used in aws_iam_openid_connect_provider client_id_list
  before_script:
    - |
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" \
        $(aws sts assume-role-with-web-identity \
          --role-arn "$AWS_ROLE_ARN" \
          --role-session-name "gitlab-${CI_JOB_ID}" \
          --web-identity-token "$AWS_OIDC_TOKEN" \
          --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
          --output text))

# ── Terraform base ────────────────────────────────────────────────────────────
.terraform:
  image: hashicorp/terraform:1.7
  extends: .aws-auth
  cache:
    key: terraform-${ENV}
    paths:
      - ${TF_ROOT}/${ENV}/.terraform

# ── Validate (all envs in parallel) ──────────────────────────────────────────
tf:validate:
  extends: .terraform
  stage: validate
  script:
    - cd ${TF_ROOT}/${ENV}
    - terraform init -backend=false
    - terraform validate
  parallel:
    matrix:
      - ENV: dev
        AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
      - ENV: staging
        AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
      - ENV: prod
        AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Dev plan + apply (auto on main) ──────────────────────────────────────────
tf:plan:dev:
  extends: .terraform
  stage: plan
  variables:
    ENV: dev
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/dev
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/dev/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

tf:apply:dev:
  extends: .terraform
  stage: apply
  variables:
    ENV: dev
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/dev
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:dev
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Staging plan + apply (manual gate) ───────────────────────────────────────
tf:plan:staging:
  extends: .terraform
  stage: plan
  variables:
    ENV: staging
    AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/staging
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/staging/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

tf:apply:staging:
  extends: .terraform
  stage: apply
  variables:
    ENV: staging
    AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/staging
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# ── Prod plan + apply (tags only, manual gate) ────────────────────────────────
tf:plan:prod:
  extends: .terraform
  stage: plan
  variables:
    ENV: prod
    AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/prod
    - terraform init
    - terraform plan -out=plan.tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/prod/plan.tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

tf:apply:prod:
  extends: .terraform
  stage: apply
  variables:
    ENV: prod
    AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
  script:
    - cd ${TF_ROOT}/prod
    - terraform init
    - terraform apply plan.tfplan
  needs:
    - tf:plan:prod
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# ── Build + push image to ECR (one job per account) ──────────────────────────
# Each environment lives in a separate AWS account with its own ECR registry.
# The image is built once per job and pushed directly to the target account's ECR.
.build-base:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  extends: .aws-auth
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build -t $ECR_REGISTRY/myapp/backend:$CI_COMMIT_SHORT_SHA .
    - docker push $ECR_REGISTRY/myapp/backend:$CI_COMMIT_SHORT_SHA

build:dev:
  extends: .build-base
  variables:
    AWS_ROLE_ARN: $DEV_TF_ROLE_ARN
    ECR_REGISTRY: $DEV_ECR_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:staging:
  extends: .build-base
  variables:
    AWS_ROLE_ARN: $STAGING_TF_ROLE_ARN
    ECR_REGISTRY: $STAGING_ECR_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

build:prod:
  extends: .build-base
  variables:
    AWS_ROLE_ARN: $PROD_TF_ROLE_ARN
    ECR_REGISTRY: $PROD_ECR_REGISTRY
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# ── Deploy: bump image tag in config repo, Flux reconciles ───────────────────
# Uses yq for YAML-safe tag replacement — sed would clobber any other key
# named "tag:" and strip indentation from the matched line.
.deploy:
  stage: deploy
  image: alpine/git
  before_script:
    - apk add --no-cache yq
  script:
    - git clone https://oauth2:${CONFIG_REPO_TOKEN}@${CI_SERVER_HOST}/${CONFIG_REPO_PATH} config
    - cd config
    - yq -i ".spec.values.image.tag = strenv(CI_COMMIT_SHORT_SHA)" clusters/${DEPLOY_ENV}/apps/myapp.yaml
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"
    - git diff --quiet || git commit -am "chore(${DEPLOY_ENV}): bump myapp to ${CI_COMMIT_SHORT_SHA}"
    - git push

deploy:dev:
  extends: .deploy
  variables:
    DEPLOY_ENV: dev
  needs:
    - build:dev
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:staging:
  extends: .deploy
  variables:
    DEPLOY_ENV: staging
  needs:
    - build:staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy:prod:
  extends: .deploy
  variables:
    DEPLOY_ENV: prod
  needs:
    - build:prod
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
